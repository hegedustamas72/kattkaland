<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Fejlesztés alatt</title>

  <!-- Google Fonts: Alex Brush -->
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Alex Brush', cursive;
      text-align: center;
      color: white;

      /* Háttérkép */
      background-image: url('wood-texture.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Sötét overlay, hogy olvasható legyen a szöveg */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    h1, p, a {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 70px;
      margin-bottom: 20px;
    }

    p {
      font-size: 30px;
    }

    a {
      margin-top: 20px;
      font-size: 25px;
      color: #ffd700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>Fejlesztés alatt</h1>
  <p>Ez az oldal még készül...</p>
  <a href="index.html">Vissza a főoldalra</a>
</body>
</html>
